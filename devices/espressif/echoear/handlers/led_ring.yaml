- logger.log:
    format: "LED Ring: Applying state: %s"
    args: ["id(led_ring_state).c_str()"]

- lvgl.widget.update:
    id: ui_led_ring
    border_color: !lambda |-
      if (id(led_ring_state) == "${led_event_not_connected}") {
        return lv_color_hex(${led_color_not_connected});
      }
      if (id(led_ring_state) == "${led_event_wake_word_detected}") {
        return lv_color_hex(${led_color_wake_word_detected});
      }
      if (id(led_ring_state) == "${led_event_listening}") {
        return lv_color_hex(${led_color_listening});
      }
      if (id(led_ring_state) == "${led_event_processing}") {
        return lv_color_hex(${led_color_processing});
      }
      if (id(led_ring_state) == "${led_event_muted}") {
        return lv_color_hex(${led_color_muted});
      }
      if (id(led_ring_state) == "${led_event_error}") {
        return lv_color_hex(${led_color_error});
      }
      return lv_color_hex(${led_color_idle});