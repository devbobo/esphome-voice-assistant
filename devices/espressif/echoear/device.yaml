## EchoEar Device Configuration Orchestrator
## Bundles all device-specific modules for EchoEar variant
##
## Module Composition:
##   - i18n: Device-specific labels and strings
##   - hardware: Board and bus definitions
##   - io_entities: High-level microphone/speaker/LED entities
##   - battery: Fuel gauge sensors
##   - display: Screen rendering and update loop
##   - ui: LVGL-based user interface widgets and styling
##   - touchscreen: Touch controller wiring
##   - media_player: Device-local media player wiring + shared media includes
##   - voice_assistant: Device-local voice assistant wiring + shared VA includes
##
## Change the device package path in base.yaml to support different hardware

substitutions:
  display_shape: "circle"
  # Device-specific LED ring handler (overrides the noop default from config.yaml)
  led_ring_state_handler: !include handlers/led_ring.yaml

packages:
  i18n: !include i18n.yaml
  hardware: !include hardware.yaml
  io_entities: !include io_entities.yaml
  battery: !include battery.yaml
  display: !include display.yaml
  touchscreen: !include touchscreen.yaml
  media_player: !include media_player.yaml
  ui: !include ui.yaml
  voice_assistant: !include voice_assistant.yaml
