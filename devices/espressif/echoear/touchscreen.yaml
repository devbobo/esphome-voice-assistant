## EchoEar Touchscreen Module
## CST816 resistive touchscreen input wiring.
## Gesture classification is delegated to shared include handlers.
## Note: Display rendering and refresh logic lives in display.yaml.

# CST816 Touchscreen Driver
touchscreen:
  - platform: cst816
    id: va_touch_screen
    interrupt_pin: GPIO10
    display: va_display
    i2c_id: bus_a

    on_touch:
      !include ../../includes/touchscreen/on_touch.yaml

    on_update:
      !include ../../includes/touchscreen/on_update.yaml

    on_release:
      !include ../../includes/touchscreen/on_release.yaml
