## EchoEar LVGL UI Module
## Owns UI rendering using LVGL widgets while state logic stays in managers.

lvgl:
  displays:
    - main_display
  touchscreens:
    - touch_screen
  pages:
    - id: main_page
      bg_color: 0x06080E
      widgets:
        - obj:
            id: ui_ring_outer
            x: 0
            y: 0
            width: 360
            height: 360
            radius: 180
            border_width: 0
            bg_color: 0x343D52
        - obj:
            id: ui_ring_inner
            x: 36
            y: 36
            width: 288
            height: 288
            radius: 144
            border_width: 0
            bg_color: 0x06080E
        - obj:
            id: ui_detail_card
            x: 72
            y: 246
            width: 216
            height: 66
            radius: 8
            border_width: 2
            border_color: 0xE8B033
            bg_color: 0x1F2638
            hidden: true

interval:
  - interval: 150ms
    then:
      - if:
          condition:
            lambda: 'return id(dm_render_requested);'
          then:
            - lambda: id(dm_render_requested) = false;

            - lvgl.widget.update:
                id: ui_detail_card
                hidden: !lambda return !id(dm_detail_mode);

            - lvgl.widget.update:
                id: ui_ring_outer
                bg_color: !lambda |-
                  if (id(led_ring_state) == "listening") {
                    return lv_color_hex(0x20A6FF);
                  }
                  if (id(led_ring_state) == "processing") {
                    return lv_color_hex(0x47D27B);
                  }
                  if (id(led_ring_state) == "muted" || id(led_ring_state) == "error") {
                    return lv_color_hex(0xDE4A4A);
                  }
                  return lv_color_hex(0x343D52);
