## EchoEar Display Module
## Owns display hardware configuration for the round LCD.
## UI rendering is provided by lvgl_ui.yaml.

substitutions:
  # Physical display dimensions (native resolution for JC3636W518V2: 360x360)
  imagewidth: "360"
  imageheight: "360"

display:
  - platform: mipi_spi
    id: main_display
    model: JC3636W518V2
    cs_pin: 14
    reset_pin: 4
    rotation: ${rotate_display}
    update_interval: never
    dimensions:
      height: ${imageheight}
      width: ${imagewidth}
