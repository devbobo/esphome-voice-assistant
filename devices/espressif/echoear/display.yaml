## EchoEar Display Module
## Owns display hardware configuration for the round LCD.
## UI rendering is provided by ui.yaml.

substitutions:
  # Physical display dimensions (native resolution for JC3636W518V2: 360x360)
  display_width: "360"
  display_height: "360"

display:
  - platform: mipi_spi
    id: va_display
    model: JC3636W518V2
    cs_pin: 14
    reset_pin: 4
    rotation: ${rotate_display}
    update_interval: never
    dimensions:
      height: ${display_height}
      width: ${display_width}
