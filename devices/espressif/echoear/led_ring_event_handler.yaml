- logger.log:
    format: "LED Ring: Handling LED event: %s"
    args: ["event_type.c_str()"]

- lvgl.widget.update:
    id: ui_ring_outer
    bg_color: !lambda |-
      if (event_type == "listening") {
        return lv_color_hex(0x20A6FF);
      }
      if (event_type == "processing") {
        return lv_color_hex(0x47D27B);
      }
      if (event_type == "muted" || event_type == "error") {
        return lv_color_hex(0xDE4A4A);
      }
      return lv_color_hex(0x343D52);