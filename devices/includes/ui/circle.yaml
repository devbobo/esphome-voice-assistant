## Circular UI Layout
## Shared LVGL layout for round displays.

substitutions:
  ring_height: ${display_height}
  ring_thickness: "15"
  ring_width: ${display_width}
  detail_card_x: "72"
  detail_card_y: "246"
  detail_card_width: "216"
  # Timer arc positioning (centered, 250x250 on 360x360 display)
  timer_arc_size: "250"
  timer_arc_x: "55"  # (display_width - timer_arc_size) / 2
  timer_arc_y: "55"  # (display_height - timer_arc_size) / 2
  timer_value_x: "0"  # Center labels horizontally with arc
  timer_value_y: "0"  # Inside arc vertically
  timer_name_y: "-40"  # Above timer value
  timer_duration_y: "60"  # Below arc

packages:
  common: !include common.yaml
