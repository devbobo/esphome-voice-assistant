- id: main_page
  bg_color: 0x06080E
  widgets:
    - obj:
        id: ui_detail_card
        x: ${detail_card_x}
        y: ${detail_card_y}
        width: ${detail_card_width}
        height: 66
        radius: 8
        border_width: 2
        border_color: 0xE8B033
        bg_color: 0x1F2638
        hidden: true

- id: timer_page
  bg_color: 0x06080E
  widgets:
    # Circular progress arc (timer ring)
    - arc:
        id: ui_timer_arc
        x: 60
        y: 60
        width: 200
        height: 200
        start_angle: 0
        end_angle: 360
        rotation: 270
        arc_width: 5
        arc_color: ${color_bright_orange}
        bg_color: 0x1F2638
        border_width: 0
    # Timer value (center text - MM:SS format)
    - label:
        id: ui_timer_value
        x: 80
        y: 140
        width: 200
        height: 70
        text: "0:00"
        text_font: montserrat_48
        align: CENTER
        text_color: ${color_white}
    # Timer duration hint (below timer)
    - label:
        id: ui_timer_duration
        x: 80
        y: 210
        width: 200
        height: 40
        text: "30 SEC."
        text_font: montserrat_16
        align: CENTER
        text_color: ${color_bright_orange}
