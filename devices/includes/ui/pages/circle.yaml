- id: main_page
  bg_color: 0x06080E
  widgets:
    - obj:
        id: ui_detail_card
        x: ${detail_card_x}
        y: ${detail_card_y}
        width: ${detail_card_width}
        height: 66
        radius: 8
        border_width: 2
        border_color: 0xE8B033
        bg_color: 0x1F2638
        hidden: true

- id: timer_page
  bg_color: 0x06080E
  widgets:
    # Circular progress arc (timer ring)
    - arc:
        id: ui_timer_arc
        x: ${timer_arc_x}
        y: ${timer_arc_y}
        width: ${timer_arc_size}
        height: ${timer_arc_size}
        start_angle: 0
        end_angle: 360
        rotation: 270
        arc_width: 5
        arc_color: ${color_light_gray}
        indicator:
          arc_color: ${color_bright_orange}
          arc_width: 5
        # bg_color: ${color_bright_orange}
        border_width: 0
    # Timer name (above timer value)
    - label:
        id: ui_timer_name
        x: ${timer_value_x}
        y: ${timer_name_y}
        width: 200
        height: 40
        text: "Timer"
        text_font: montserrat_24
        text_align: CENTER
        align: CENTER
        text_color: ${color_light_gray}
    # Timer value (center text - MM:SS or H:MM:SS format)
    - label:
        id: ui_timer_value
        x: ${timer_value_x}
        y: ${timer_value_y}
        width: 200
        # height: 70
        text: "0:00"
        text_align: CENTER
        text_font: montserrat_60
        align: CENTER
        text_color: ${color_white}
    # Timer duration hint (below timer)
    - label:
        id: ui_timer_duration
        x: ${timer_value_x}
        y: ${timer_duration_y}
        width: 200
        height: 40
        text: "30 SEC."
        text_font: montserrat_24
        text_align: CENTER
        align: CENTER
        text_color: ${color_bright_orange}
