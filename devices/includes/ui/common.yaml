## Shared UI scaffold.
## Shape-specific layouts are loaded via partial includes.

substitutions:
  ui_top_layer_include: "top_layer/${display_shape}.yaml"
  ui_pages_include: "pages/${display_shape}.yaml"

lvgl:
  displays:
    - va_display
  touchscreens:
    - va_touch_screen
  top_layer: !include ${ui_top_layer_include}
  pages: !include ${ui_pages_include}

interval:
  - interval: 150ms
    then:
      - if:
          condition:
            lambda: 'return id(dm_render_requested);'
          then:
            - lambda: id(dm_render_requested) = false;
            - lvgl.widget.update:
                id: ui_detail_card
                hidden: !lambda return !id(dm_detail_mode);
