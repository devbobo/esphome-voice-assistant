## Shared Media Player Common Entities
## Reusable across devices that provide a media_player implementation.

globals:
  - id: last_announcement_was_external
    type: bool
    restore_value: no
    initial_value: "false"

switch:
  - platform: template
    id: startup_sound_switch
    name: Startup Sound
    icon: mdi:card-text-outline
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
