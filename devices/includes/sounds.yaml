## Sound File Definitions
## Audio files for media player
## Substitutions (sound URLs) are defined in config.yaml
## This file is included directly into media_player.files array

- id: ready_sound
  file: ${sound_startup}
- id: wake_word_triggered_sound
  file: ${sound_wake_word}
- id: timer_started_sound
  file: ${sound_timer_started}
- id: timer_alarm_sound
  file: ${sound_timer_alarm}
