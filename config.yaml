## Global Configuration & Substitutions
## Centralized configuration values loaded at project level
substitutions:
  xiaozhi: "https://github.com/RealDeco/xiaozhi-esphome"

  # Default no-op LED state handler. Device packages can override this
  # (e.g. EchoEar uses devices/espressif/echoear/handlers/led_ring.yaml).
  led_ring_state_handler: !include devices/includes/led_ring/noop_state_handler.yaml
  
  # Audio feedback sounds base URL
  xiaozhi_sounds: "${xiaozhi}/raw/main/sounds"

  # Audio file URLs (customize to use your own sounds)
  sound_startup: "${xiaozhi_sounds}/Home_Connected.flac"
  sound_wake_word: "${xiaozhi_sounds}/wake_word_triggered.flac"
  sound_timer_started: "${xiaozhi_sounds}/popup.flac"
  sound_timer_alarm: "${xiaozhi_sounds}/timer_finished.flac"
