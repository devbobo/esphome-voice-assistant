################################################################################
## Audio State Manager
##
## Manages audio feedback sounds during voice interactions and boot.
## Does NOT control microphone or wake word state directly; instead
## publishes events for Voice State Manager to react to.
##
## Architecture:
##   - Subscribes to: system_event via event_router routing
##   - Filters for:
##       api_connected: stop wake word (via event), play startup sound
##   - Publishes:
##       wake_word_stop_requested: before playing startup sound
##       audio_ready: after startup sound flow completes (signals
##                    Voice Manager to re-arm wake word)
##   - Executes: play_sound (with priority queuing)
##
## Boot Flow:
##   api_connected
##     → emit wake_word_stop_requested
##     → wait for mic to stop capturing
##     → play startup sound (first boot) or skip (reconnect)
##     → emit audio_ready
##
## Separation of Concerns:
##   - Audio State Manager: sound playback and audio feedback only.
##   - Voice State Manager: sole owner of wake word and capture.
##   - Event Router: routes events; no audio actions.
################################################################################

################################################################################
## Audio State Tracking
##
## Globals to track audio playback state and ensure one-time actions.
################################################################################
globals:
  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"
    # Ensures startup sound plays only once after API connection
  - id: api_connect_flow_completed
    type: bool
    restore_value: no
    initial_value: "false"
    # Prevent duplicate api_connected handling while a client session is active

################################################################################
## Audio State Manager Event Handler
##
## Called from event_router when system events occur.
## Manages sound playback and timing based on events.
################################################################################

script:
  - id: audio_state_manager_handle_event
    mode: queued
    parameters:
      event_type: string
    then:
      - logger.log:
          format: "Audio Manager: Received event %s"
          args: ["event_type.c_str()"]

      # API connected
      - if:
          condition:
            lambda: 'return event_type == "${evt_api_connected}";'
          then:
            - if:
                condition:
                  lambda: return !id(api_connect_flow_completed);
                then:
                  - lambda: id(api_connect_flow_completed) = true;
                  - logger.log: "Audio: API connected - preparing startup sound"
                  - event.trigger:
                      id: system_event
                      event_type: "${evt_wake_word_stop_requested}"
                  - wait_until:
                      condition:
                        - not:
                            microphone.is_capturing
                      timeout: 3s
                  - delay: 200ms
                  - logger.log: "Audio: API connected - playing startup sound"
                  - if:
                      condition:
                        and:
                          - lambda: return !id(boot_sound_played);
                          - switch.is_on: startup_sound_switch
                      then:
                        - lambda: id(boot_sound_played) = true;
                        - script.execute:
                            id: play_sound
                            priority: true
                            sound_file: !lambda return id(ready_sound);
                        - script.wait: play_sound
                        - event.trigger:
                            id: system_event
                            event_type: "${evt_audio_ready}"
                      else:
                        - logger.log: "Audio: API reconnected - skipping startup sound"
                        - event.trigger:
                            id: system_event
                            event_type: "${evt_audio_ready}"
                else:
                  - logger.log: "Audio: Duplicate api_connected ignored"

      # API disconnected - allow next connect event to run startup/rearm flow
      - if:
          condition:
            lambda: 'return event_type == "${evt_api_disconnected}";'
          then:
            - lambda: id(api_connect_flow_completed) = false;
            - logger.log: "Audio: API disconnected - reset connect flow state"

      # Timer started: queue timer_started sound (guard I2S bus on shared hardware)
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_timer_started}";'
          then:
            - logger.log: "Audio: Timer started - queuing sound"
            - if:
                condition:
                  lambda: 'return std::string("${i2s_shared_bus}") == "true";'
                then:
                  # Shared I2S bus: stop mic, play, wait, restart listen
                  - script.execute: microphone_stop_listening
                  - script.wait: microphone_stop_listening
                  - script.execute:
                      id: play_sound
                      priority: true
                      sound_file: !lambda return id(timer_started_sound);
                  - script.wait: play_sound
                  - voice_assistant.start:
                else:
                  # Separate buses: play sound without stopping mic
                  - script.execute:
                      id: play_sound
                      priority: false
                      sound_file: !lambda return id(timer_started_sound);

      # Timer finished: play looping alarm
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_timer_finished}";'
          then:
            - logger.log: "Audio: Timer finished - starting alarm"
            - script.execute: timer_play_looping_alarm

      # Timer cancelled: stop any looping alarm
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_timer_cancelled}";'
          then:
            - logger.log: "Audio: Timer cancelled - stopping alarm"
            - script.execute: timer_stop_looping_alarm

      - logger.log:
          format: "Audio Manager: Handled event %s"
          args: ["event_type.c_str()"]

  - id: play_sound
    mode: queued
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(va_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ((id(va_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(va_media_player)->play_file(sound_file, true, false);
          }
      # The media pipeline may transition to ANNOUNCING asynchronously.
      # Wait for playback lifecycle rather than sampling speaker state once.
      - wait_until:
          condition:
            media_player.is_announcing:
          timeout: 2s
      - wait_until:
          condition:
            not:
              media_player.is_announcing:
          timeout: 30s
      - wait_until:
          condition:
            not:
              speaker.is_playing:
                id: va_speaker
          timeout: 5s
      - delay: 300ms

  ############################################################################
  ## Module Hooks - Called by modules to queue sounds
  ##
  ## Modules can call these scripts to queue sounds for playback.
  ## This allows modules to provide audio feedback without tight coupling.
  ############################################################################

  - id: audio_queue_sound
    mode: queued
    parameters:
      sound_key: string
    then:
      - logger.log:
          format: "Audio: Queue sound '%s'"
          args: ["sound_key.c_str()"]
      
      # Module sound routing
      # Modules call this script with sound_key (e.g., "timer_started", "timer_alarm")
      - if:
          condition:
            lambda: 'return sound_key == "timer_started";'
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: !lambda return id(timer_started_sound);
            - script.wait: play_sound
      
      - if:
          condition:
            lambda: 'return sound_key == "timer_alarm";'
          then:
            - script.execute:
                id: play_sound
                priority: true
                sound_file: !lambda return id(timer_alarm_sound);
            - script.wait: play_sound
      
      - if:
          condition:
            lambda: 'return sound_key == "mute_on";'
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: !lambda return id(mute_on_sound);
            - script.wait: play_sound
      
      - if:
          condition:
            lambda: 'return sound_key == "mute_off";'
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: !lambda return id(mute_off_sound);
            - script.wait: play_sound

  - id: audio_stop_sound
    mode: queued
    then:
      - logger.log: "Audio: Stop current sound"
      - media_player.stop: va_media_player
