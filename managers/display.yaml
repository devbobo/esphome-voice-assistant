################################################################################
## Display Manager
##
## Central owner for display state and rendering intent.
## This manager is event-driven and receives:
##   1) System events from event_router
##   2) Touchscreen gesture events from touchscreen manager
##
## The manager currently tracks view/state and exposes render hooks.
## Device-specific display implementations can consume these globals/scripts.
################################################################################

globals:
  - id: dm_current_view
    type: std::string
    restore_value: no
    initial_value: '"idle"'

  - id: dm_assistant_state
    type: std::string
    restore_value: no
    initial_value: '"idle"'

  - id: dm_page_index
    type: int
    restore_value: no
    initial_value: "0"

  - id: dm_detail_mode
    type: bool
    restore_value: no
    initial_value: "false"

  - id: dm_render_requested
    type: bool
    restore_value: no
    initial_value: "true"

  - id: dm_last_system_event
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: dm_last_touch_event
    type: std::string
    restore_value: no
    initial_value: '""'

script:
  - id: display_manager_request_render
    mode: restart
    then:
      - lambda: id(dm_render_requested) = true;

  - id: display_manager_recompute_view
    mode: restart
    then:
      - lambda: |-
          if (id(dm_detail_mode)) {
            id(dm_current_view) = "detail_" + id(dm_assistant_state);
            return;
          }

          id(dm_current_view) = "page_" + to_string(id(dm_page_index)) + "_" + id(dm_assistant_state);

  - id: display_manager_handle_system_event
    mode: queued
    parameters:
      event_type: string
    then:
      - lambda: id(dm_last_system_event) = event_type;

      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_api_disconnected}",
                "${evt_va_error}"
              }.count(event_type) > 0;
          then:
            - lambda: id(dm_assistant_state) = "error";

      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_va_listening}"
              }.count(event_type) > 0;
          then:
            - lambda: id(dm_assistant_state) = "listening";

      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_va_thinking}"
              }.count(event_type) > 0;
          then:
            - lambda: id(dm_assistant_state) = "thinking";

      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_va_replying}",
                "${evt_announcement_started}"
              }.count(event_type) > 0;
          then:
            - lambda: id(dm_assistant_state) = "replying";

      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_media_player_idle}",
                "${evt_va_idle}",
                "${evt_audio_ready}",
                "${evt_api_connected}"
              }.count(event_type) > 0;
          then:
            - lambda: id(dm_assistant_state) = "idle";

      - script.execute: display_manager_recompute_view
      - script.execute: display_manager_render

  - id: display_manager_handle_touch_event
    mode: queued
    parameters:
      touchscreen_event: string
    then:
      - lambda: id(dm_last_touch_event) = touchscreen_event;

      - if:
          condition:
            lambda: 'return touchscreen_event == "${touchscreen_swipe_left}";'
          then:
            - lambda: |-
                id(dm_detail_mode) = false;
                id(dm_page_index) = (id(dm_page_index) + 1) % 3;
      - if:
          condition:
            lambda: 'return touchscreen_event == "${touchscreen_swipe_right}";'
          then:
            - lambda: |-
                id(dm_detail_mode) = false;
                id(dm_page_index) = (id(dm_page_index) + 2) % 3;
      - if:
          condition:
            lambda: 'return touchscreen_event == "${touchscreen_single_press}";'
          then:
            - lambda: id(dm_detail_mode) = !id(dm_detail_mode);
      - if:
          condition:
            lambda: 'return touchscreen_event == "${touchscreen_double_press}";'
          then:
            - lambda: |-
                id(dm_detail_mode) = false;
                id(dm_page_index) = 0;

      - script.execute: display_manager_recompute_view
      - script.execute: display_manager_render

  - id: display_manager_render
    mode: restart
    then:
      - script.execute: display_manager_request_render
      - logger.log:
          format: "Display Manager: view=%s state=%s page=%d detail=%s system=%s touch=%s"
          args:
            - "id(dm_current_view).c_str()"
            - "id(dm_assistant_state).c_str()"
            - "id(dm_page_index)"
            - 'id(dm_detail_mode) ? "on" : "off"'
            - "id(dm_last_system_event).c_str()"
            - "id(dm_last_touch_event).c_str()"

interval:
  - interval: 2s
    then:
      - script.execute: display_manager_request_render
