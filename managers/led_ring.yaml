################################################################################
## LED Ring State Manager
##
## Consumes canonical interaction_state_changed events and translates them into
## LED ring feedback decisions.
##
## Architecture:
##   - Subscribes to: interaction_state_changed via interaction manager
##   - Publishes: LED events via led_event platform
##   - Implementation: Device-specific handlers consume led_event
##
## LED Ring States:
##   - not_connected: Device is not connected to Home Assistant
##   - idle: Device ready but not listening
##   - wake_word_detected: Wake word detected (brief pulse/flash feedback)
##   - listening: Voice assistant actively listening for speech
##   - processing: Voice command recognized or TTS playing
##   - muted: Microphone disabled (solid red)
##   - error: System error or communication issue
##
## Separation of Concerns:
##   - LED Ring Manager: sole owner of LED translation decisions.
##   - Interaction manager: sole owner of canonical interaction semantics.
##   - Device implementations: handle hardware-specific LED animation/color.
################################################################################

substitutions:
  # LED Event Types (published by this manager)
  led_event_not_connected: "not_connected"
  led_event_wake_word_detected: "wake_word_detected"
  led_event_listening: "listening"
  led_event_muted: "muted"
  led_event_processing: "processing"
  led_event_idle: "idle"
  led_event_error: "error"

  # Color Palette - Base hex values
  color_brown: "0x8B6A2A"
  color_blue: "0x20A6FF"
  color_dark_blue: "0x343D52"
  color_green: "0x47D27B"
  color_bright_green: "0x00FF00"
  color_orange: "0xFFA500"
  color_bright_orange: "0xFF8800"
  color_red: "0xDE4A4A"
  color_white: "0xFFFFFF"
  color_black: "0x000000"

  # State-specific colors (reference palette for easy customization)
  led_color_not_connected: ${color_brown}
  led_color_wake_word_detected: ${color_blue}
  led_color_idle: ${color_dark_blue}
  led_color_listening: ${color_green}
  led_color_processing: ${color_bright_green}
  led_color_muted: ${color_red}
  led_color_error: ${color_red}

## LED State Tracking
globals:
  - id: led_ring_state
    type: std::string
    restore_value: no
    initial_value: '"not_connected"'
    # Canonical ring state shared by physical LED ring and virtual screen ring

script:
  ################################################################################
  ## LED Ring - Interaction State Handler
  ##
  ## Called from interaction_state_changed event.
  ## Translates canonical interaction state → led_event.
  ## No system-event mapping here; that logic lives in interaction_state_manager.
  ################################################################################
  - id: led_ring_handle_interaction_state
    parameters:
      interaction_state: string
    then:
      - logger.log:
          format: "LED Ring: interaction state → %s"
          args: ["interaction_state.c_str()"]
      - if:
          condition:
            lambda: 'return interaction_state == "${istate_not_connected}";'
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_not_connected}"
      - if:
          condition:
            lambda: 'return interaction_state == "${istate_idle}";'
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_idle}"
      - if:
          condition:
            lambda: 'return interaction_state == "${istate_muted}";'
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_muted}"
      - if:
          condition:
            lambda: 'return interaction_state == "${istate_wake_word_detected}";'
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_wake_word_detected}"
      - if:
          condition:
            lambda: 'return interaction_state == "${istate_listening}";'
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_listening}"
      - if:
          condition:
            lambda: |-
              return interaction_state == "${istate_thinking}" ||
                     interaction_state == "${istate_replying}";
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_processing}"
      - if:
          condition:
            lambda: 'return interaction_state == "${istate_error}";'
          then:
            - event.trigger:
                id: led_event
                event_type: "${led_event_error}"

  ################################################################################
  ## Apply Device LED Handler
  ##
  ## Runs device-specific LED/UI updates based on canonical led_ring_state.
  ## This allows both event-driven and state-reconcile call sites to reuse the
  ## same device handler without relying on event_type scope.
  ################################################################################
  - id: led_ring_apply_device_handler
    then: ${led_ring_state_handler}


## LED Event Platform
##
## Output events for LED ring control by device-specific handlers.
## This platform fires the LED translation events computed from canonical interaction state.
##
event:
  - platform: template
    id: led_event
    name: "LED Ring Event"
    icon: "mdi:led-on"
    event_types:
      - ${led_event_not_connected}
      - ${led_event_wake_word_detected}
      - ${led_event_listening}
      - ${led_event_muted}
      - ${led_event_processing}
      - ${led_event_idle}
      - ${led_event_error}
    on_event:
      - lambda: |-
          id(led_ring_state) = event_type;
      - script.execute: led_ring_apply_device_handler
