################################################################################
## LED Ring State Manager
##
## Listens to system_event and makes LED ring state decisions independently.
## Converts system events into LED ring state changes.
##
## Architecture:
##   - Subscribes to: system_event via event_router routing
##   - Filters for: wake_acknowledged, mic_muted/unmuted, voice_assist_idle, api_connected
##   - Publishes: LED events via led_event platform
##   - Implementation: Device-specific handlers consume led_event
##
## LED Ring States:
##   - not_connected: Device is not connected to Home Assistant
##   - idle: Device ready but not listening
##   - listening: Wake feedback started or assistant is listening
##   - muted: Microphone disabled (solid red)
##   - processing: Voice command recognized
##   - error: System error or communication issue
##
## Separation of Concerns:
##   - LED Ring Manager: sole owner of LED state decisions.
##   - Event Router: routes events; never executes LED actions.
##   - Device implementations: handle hardware-specific LED animation/color.
################################################################################

substitutions:
  # LED Event Types (published by this manager)
  led_event_not_connected: "not_connected"
  led_event_listening: "listening"
  led_event_muted: "muted"
  led_event_processing: "processing"
  led_event_idle: "idle"
  led_event_error: "error"

  # LED Ring State Colors (consumed by UI and device handlers)
  led_color_not_connected: "0x8B6A2A"
  led_color_idle: "0x343D52"
  led_color_listening: "0x20A6FF"
  led_color_processing: "0x47D27B"
  led_color_muted: "0xDE4A4A"
  led_color_error: "0xDE4A4A"

## LED State Tracking
globals:
  - id: led_ring_state
    type: std::string
    restore_value: no
    initial_value: '"not_connected"'
    # Canonical ring state shared by physical LED ring and virtual screen ring

script:
  ################################################################################
  ## LED State Manager Event Handler
  ##
  ## Called from event_router when system events occur.
  ## Makes LED state decisions based on voice and audio events.
  ################################################################################
  - id: led_state_manager_handle_event
    parameters:
      event_type: string
    then:
      - logger.log:
          format: "LED Manager: Received event %s"
          args: ["event_type.c_str()"]

      # Wake feedback started - enter listening mode in sync with the beep
      - if:
          condition:
            lambda: 'return event_type == "${evt_wake_acknowledged}";'
          then:
            - logger.log: "LED: Wake acknowledged - entering listening"
            - event.trigger:
                id: led_event
                event_type: "${led_event_listening}"

      # Voice pipeline listening state
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_listening}";'
          then:
            - logger.log: "LED: Voice listening"
            - event.trigger:
                id: led_event
                event_type: "${led_event_listening}"

      # Voice thinking/processing
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_thinking}";'
          then:
            - logger.log: "LED: Voice processing"
            - event.trigger:
                id: led_event
                event_type: "${led_event_processing}"

      # Announcements/replies are treated as processing
      - if:
          condition:
            lambda: 'return event_type == "${evt_announcement_started}";'
          then:
            - logger.log: "LED: Announcement started - processing"
            - event.trigger:
                id: led_event
                event_type: "${led_event_processing}"

      # Microphone muted
      - if:
          condition:
            lambda: 'return event_type == "${evt_mic_muted}";'
          then:
            - logger.log: "LED: Microphone muted"
            - event.trigger:
                id: led_event
                event_type: "${led_event_muted}"

      # Microphone unmuted
      - if:
          condition:
            lambda: 'return event_type == "${evt_mic_unmuted}";'
          then:
            - logger.log: "LED: Microphone unmuted - entering idle"
            - event.trigger:
                id: led_event
                event_type: "${led_event_idle}"

      # Voice complete
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_idle}";'
          then:
            - logger.log: "LED: Voice complete - returning to idle"
            - event.trigger:
                id: led_event
                event_type: "${led_event_idle}"

      # API connected
      - if:
          condition:
            lambda: 'return event_type == "${evt_api_connected}";'
          then:
            - logger.log: "LED: API connected - entering idle"
            - event.trigger:
                id: led_event
                event_type: "${led_event_idle}"

      # API disconnected -> not connected state
      - if:
          condition:
            lambda: 'return event_type == "${evt_api_disconnected}";'
          then:
            - logger.log: "LED: API disconnected - not connected"
            - event.trigger:
                id: led_event
                event_type: "${led_event_not_connected}"

      # Voice assistant error -> error state
      - if:
          condition:
            lambda: 'return event_type == "${evt_va_error}";'
          then:
            - logger.log: "LED: Error state"
            - event.trigger:
                id: led_event
                event_type: "${led_event_error}"

  ################################################################################
  ## Apply Device LED Handler
  ##
  ## Runs device-specific LED/UI updates based on canonical led_ring_state.
  ## This allows both event-driven and state-reconcile call sites to reuse the
  ## same device handler without relying on event_type scope.
  ################################################################################
  - id: led_ring_apply_device_handler
    then: ${led_ring_state_handler}


## LED Event Platform
##
## Output events for LED ring control by device-specific handlers.
## This platform fires the LED state decisions made by the manager above.
##
event:
  - platform: template
    id: led_event
    name: "LED Ring Event"
    icon: "mdi:led-on"
    event_types:
      - ${led_event_not_connected}
      - ${led_event_listening}
      - ${led_event_muted}
      - ${led_event_processing}
      - ${led_event_idle}
      - ${led_event_error}
    on_event:
      - lambda: |-
          id(led_ring_state) = event_type;
      - script.execute: led_ring_apply_device_handler
