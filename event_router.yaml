################################################################################
## System Event Bus
##
## Central event platform that broadcasts all system events.
## All state managers subscribe to system_event and filter by event_type.
##
## Single Event Bus Pattern:
##   - device-scoped voice_assistant packages publish events to system_event
##   - device-scoped media_player packages publish events to system_event
##   - va_microphone_switch publishes mic_muted/unmuted to system_event
##   - All state managers (voice, audio, led_ring, touchscreen, display) listen
##     to system_event and filter by event_type
##
## Routing Strategy:
##   - API state globals updated first (before routing to managers)
##   - Stop-related events routed to Voice State Manager directly
##   - Audio events routed to Audio State Manager (waits for mic idle)
##   - Start-related events routed to Voice State Manager after audio
##
## Event Types:
##   - api_connected:            Connected to Home Assistant
##   - api_disconnected:         Disconnected from Home Assistant
##   - announcement_started:     External HA announcement began (playback semantic)
##   - mic_muted:                Microphone switch toggled off (capture stopped)
##   - mic_unmuted:              Microphone switch toggled on
##   - audio_ready:              Startup sound flow completed; safe to re-arm wake word
##   - voice_assist_start:           Voice assist pipeline started
##   - voice_assist_listening:       Microphone listening for speech
##   - voice_assist_wake_word_detected: Wake word detected
##   - voice_assist_stt_vad_start:   Voice activity detected (STT starting)
##   - voice_assist_stt_end:         Speech-to-text complete
##   - voice_assist_intent_start:    Intent processing started
##   - voice_assist_intent_progress: Intent streaming
##   - voice_assist_intent_end:      Intent processing complete
##   - voice_assist_thinking:        Processing STT/intent (generic)
##   - voice_assist_replying:        TTS started (response being generated)
##   - voice_assist_tts_end:         Text-to-speech complete
##   - voice_assist_idle:        Voice assistant session ended (on_end fired)
##   - voice_assist_error:       Voice assistant encountered an error
##   - voice_assist_client_connected: HA API connected
##   - voice_assist_client_disconnected: HA API disconnected
##   - voice_assist_timer_*:     Timer events (started, updated, tick, finished, cancelled)
##
## Usage Examples:
##   Publish from device voice_assistant package:
##     - event.trigger:
##         id: system_event
##         event_type: ${evt_va_idle}
##
##   Request wake word stop from any component:
##     - event.trigger:
##         id: system_event
##         event_type: ${evt_wake_word_stop_requested}
##
##   React in a state manager:
##     - if:
##         condition:
##           lambda: 'return event_type == "${evt_va_idle}";'
##         then: ...
################################################################################

substitutions:
  # System event type constants
  evt_api_connected:              "api_connected"
  evt_api_disconnected:           "api_disconnected"
  evt_announcement_started:       "announcement_started"
  evt_mic_muted:                  "mic_muted"
  evt_mic_unmuted:                "mic_unmuted"
  evt_audio_ready:                "audio_ready"
  evt_va_idle:                    "voice_assist_idle"
  evt_va_start:                   "voice_assist_start"
  evt_va_listening:               "voice_assist_listening"
  evt_va_wake_word_detected:      "voice_assist_wake_word_detected"
  evt_va_stt_vad_start:           "voice_assist_stt_vad_start"
  evt_va_stt_vad_end:             "voice_assist_stt_vad_end"
  evt_va_stt_end:                 "voice_assist_stt_end"
  evt_va_intent_start:            "voice_assist_intent_start"
  evt_va_intent_progress:         "voice_assist_intent_progress"
  evt_va_intent_end:              "voice_assist_intent_end"
  evt_va_tts_start:               "voice_assist_tts_start"
  evt_va_tts_end:                 "voice_assist_tts_end"
  evt_va_error:                   "voice_assist_error"
  evt_va_client_connected:        "voice_assist_client_connected"
  evt_va_client_disconnected:     "voice_assist_client_disconnected"
  evt_va_timer_started:           "voice_assist_timer_started"
  evt_va_timer_updated:           "voice_assist_timer_updated"
  evt_va_timer_tick:              "voice_assist_timer_tick"
  evt_va_timer_finished:          "voice_assist_timer_finished"
  evt_va_timer_cancelled:         "voice_assist_timer_cancelled"
  evt_wake_word_stop_requested:   "wake_word_stop_requested"
  evt_wake_word_location_changed: "wake_word_location_changed"

globals:
  - id: api_client_connected
    type: bool
    restore_value: no
    initial_value: "false"
    # Tracks whether at least one Home Assistant API client is connected

api:
  on_client_connected:
    - logger.log: "Connected to Home Assistant"
    - event.trigger:
        id: system_event
        event_type: "${evt_api_connected}"
  on_client_disconnected:
    - logger.log: "Disconnected from Home Assistant"
    - event.trigger:
        id: system_event
        event_type: "${evt_api_disconnected}"

event:
  - platform: template
    id: system_event
    event_types:
      - ${evt_api_connected}
      - ${evt_api_disconnected}
      - ${evt_announcement_started}
      - ${evt_mic_muted}
      - ${evt_mic_unmuted}
      - ${evt_audio_ready}
      - ${evt_va_idle}
      - ${evt_va_start}
      - ${evt_va_wake_word_detected}
      - ${evt_va_listening}
      - ${evt_va_stt_vad_start}
      - ${evt_va_stt_vad_end}
      - ${evt_va_stt_end}
      - ${evt_va_intent_start}
      - ${evt_va_intent_progress}
      - ${evt_va_intent_end}
      - ${evt_va_tts_start}
      - ${evt_va_tts_end}
      - ${evt_va_error}
      - ${evt_va_client_connected}
      - ${evt_va_client_disconnected}
      - ${evt_va_timer_started}
      - ${evt_va_timer_updated}
      - ${evt_va_timer_tick}
      - ${evt_va_timer_finished}
      - ${evt_va_timer_cancelled}
      - ${evt_wake_word_stop_requested}
      - ${evt_wake_word_location_changed}
    on_event:
      - logger.log:
          format: "System Event: %s"
          args: ["event_type.c_str()"]

      # Track API client connection state centrally
      - if:
          condition:
            lambda: 'return event_type == "${evt_api_connected}";'
          then:
            - lambda: id(api_client_connected) = true;
      - if:
          condition:
            lambda: 'return event_type == "${evt_api_disconnected}";'
          then:
            - lambda: id(api_client_connected) = false;

      # Voice State Manager stop-related events
      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_api_disconnected}",
                "${evt_announcement_started}",
                "${evt_mic_muted}",
                "${evt_wake_word_stop_requested}",
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: voice_state_manager_handle_event
                event_type: !lambda return event_type;

      # Interaction State Manager - canonical state owner for LED and display
      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_api_connected}",
                "${evt_api_disconnected}",
                "${evt_audio_ready}",
                "${evt_announcement_started}",
                "${evt_mic_muted}",
                "${evt_mic_unmuted}",
                "${evt_va_idle}",
                "${evt_va_wake_word_detected}",
                "${evt_va_listening}",
                "${evt_va_stt_vad_end}",
                "${evt_va_tts_start}",
                "${evt_va_error}"
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: interaction_state_handle_system_event
                event_type: !lambda return event_type;

      # Audio State Manager - handles audio coordination
      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_api_connected}",
                "${evt_api_disconnected}",
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: audio_state_manager_handle_event
                event_type: !lambda return event_type;

      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_mic_unmuted}",
                "${evt_audio_ready}",
                "${evt_va_idle}",
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: voice_state_manager_handle_event
                event_type: !lambda return event_type;

      # Audio State Manager - handle timer audio events
      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_va_timer_started}",
                "${evt_va_timer_finished}",
                "${evt_va_timer_cancelled}",
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: audio_state_manager_handle_event
                event_type: !lambda return event_type;

      # LED Ring Manager - handle timer LED events
      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_va_timer_finished}",
                "${evt_va_timer_cancelled}",
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: led_ring_handle_timer_event
                timer_event: !lambda return event_type;

      # Display Manager - handle all timer display events
      - if:
          condition:
            lambda: >-
              return std::set<std::string>{
                "${evt_va_timer_started}",
                "${evt_va_timer_updated}",
                "${evt_va_timer_tick}",
                "${evt_va_timer_finished}",
                "${evt_va_timer_cancelled}",
              }.count(event_type) > 0;
          then:
            - script.execute:
                id: display_manager_handle_timer_event
                timer_event: !lambda return event_type;

packages:
  interaction_manager: !include managers/interaction.yaml
  audio_manager: !include managers/audio.yaml
  voice_manager: !include managers/voice.yaml
  led_ring_manager: !include managers/led_ring.yaml
  touchscreen_manager: !include managers/touchscreen.yaml
  display_manager: !include managers/display.yaml

