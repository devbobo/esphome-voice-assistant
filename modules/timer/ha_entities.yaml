################################################################################
## Timer Module - Home Assistant Entities
##
## Exposes native voice_assistant timer state to Home Assistant.
## 
## State is tracked via globals defined in core.yaml and updated by
## voice_assistant on_timer_* handlers in devices/includes/voice_assistant/common.yaml
##
## Entities:
##   - Binary sensor: Timer is active
##   - Sensor: Remaining seconds
##   - Text sensor: Timer name
##   - Buttons: Cancel timer (via HA service)
################################################################################

binary_sensor:
  - platform: template
    id: mm_timer_is_active_ha
    name: "${mm_timer_ha_active_binary_sensor}"
    lambda: |-
      return !id(mm_timer_active_id).empty();

sensor:
  - platform: template
    id: mm_timer_remaining_seconds
    name: "${mm_timer_ha_remaining_sensor}"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      return (float)id(mm_timer_seconds_remaining);

text_sensor:
  - platform: template
    id: mm_timer_name
    name: "${mm_timer_ha_name_sensor}"
    lambda: |-
      return id(mm_timer_active_name);

button:
  - platform: template
    id: mm_timer_button_cancel
    name: "${mm_timer_ha_cancel_button}"
    on_press:
      - logger.log: "Cancel timer button pressed"
      - voice_assistant.stop:
