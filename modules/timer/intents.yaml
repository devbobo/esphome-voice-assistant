################################################################################
## Timer Intent Sentences
##
## Add this to your Home Assistant custom_sentences/en/ directory as:
## config/custom_sentences/en/timer.yaml
##
## This file defines voice commands for timer control
################################################################################

language: en

intents:
  timer_set:
    data:
      - sentences:
          - "set a timer for {duration}"
          - "set [a] timer [for] {duration}"
          - "set timer {duration}"
          - "timer for {duration}"
          - "{duration} timer"
          - "start a timer for {duration}"
          - "create a timer for {duration}"
        slots:
          duration: duration

  timer_pause:
    data:
      - sentences:
          - "pause [the] timer"
          - "pause timer"
          - "pause [the] [my] alarm"

  timer_resume:
    data:
      - sentences:
          - "resume [the] timer"
          - "resume timer"
          - "resume [the] [my] alarm"
          - "continue [the] timer"

  timer_cancel:
    data:
      - sentences:
          - "cancel [the] timer"
          - "cancel timer"
          - "stop [the] timer"
          - "stop timer"
          - "turn off [the] timer"
          - "turn off timer"

  timer_status:
    data:
      - sentences:
          - "how much time is left"
          - "how much time left [on the timer]"
          - "check [the] timer"
          - "check [on] [my] timer"
          - "what's [the] time left"
          - "[what is the] time remaining"
