################################################################################
## Timer Module
##
## Self-contained, plug-and-play timer functionality.
##
## Files:
##   - i18n.yaml: All user-facing strings (for translation)
##   - manifest.yaml: Declares all capabilities (intents, pages, entities, etc.)
##                   READ BY: Module developers, core team documentation
##                   NOT INCLUDED in ESPHome compilation
##
##   - core.yaml: State globals and command scripts
##   - voice.yaml: Voice intent handler
##   - display.yaml: Display page renderers
##   - ha_entities.yaml: Home Assistant integration
##
## Architecture (Option 4 - Module Manifest System):
##   1. manifest.yaml declares what the module does
##   2. Core managers read manifests and build routing tables at compile time
##   3. When events arrive, core uses routing table to call module handlers
##   4. Result: Completely self-contained, zero core modifications needed
##
## Entry Points (declared in manifest, called by core):
##   - Voice: mm_timer_voice_handler(intent_id, parameters)
##   - Display: mm_timer_render_{page_name}()
##   - LED: Automatic via led_event routing
##   - Audio: Core calls audio_queue_sound(sound_key)
##   - HA: All entities auto-discovered from manifest
##
## See modules/MANIFEST_SYSTEM.md for detailed architecture documentation.
################################################################################

packages:
  # Internationalization - All user-facing strings
  timer_i18n: !include i18n.yaml

  # Core timer logic
  timer_core: !include core.yaml

  # Integration implementations
  timer_voice: !include voice.yaml
  timer_display: !include display.yaml
  timer_ha_entities: !include ha_entities.yaml

# Note: manifest.yaml is NOT included here - it's documentation for developers
# and tooling, not ESPHome YAML configuration.

