## Timer Module - ARCHIVED - Now Core Functionality
##
## Timer core functionality has been moved to:
##   devices/includes/voice_assistant/common.yaml
##
## This represents the ESPHome architectural decision:
##   - Timer state machine: Handled natively by voice_assistant component
##   - Timer handlers (on_timer_started, etc.): In voice_assistant common
##   - Timer globals: Defined in voice_assistant common
##
## This module now contains ONLY optional display/UI enhancements:
##   - Display rendering (countdown, expired states)
##   - Home Assistant entity integrations
##
## The module is optional because:
##   - Timers work on any device with voice_assistant (core feature)
##   - This module just makes them visible/usable via UI or HA
##   - A device can use timers without this display module
##
## To use timers: Just use ESPHome's voice_assistant component
##   - Timers automatically work via native on_timer_* handlers
##   - No module setup required
##
## To enhance timer display/UI: Optional - include this module
##   - Adds countdown display rendering
##   - Adds HA entity integration
##   - Adds LED/audio feedback integration
