################################################################################
## Timer Module - Display Integration
##
## Optional display rendering for timer state.
## These render scripts are called by the display manager when
## dm_current_view is set to "module_timer:countdown" or "module_timer:expired"
## by the core voice_assistant handlers.
##
## Entry points:
##   - mm_timer_render_countdown: Show remaining time on display
##   - mm_timer_render_expired: Show "Timer Expired" message
##
## Note: This module is entirely optional.
## Timers work without this module - they just won't have custom display rendering.
################################################################################

script:
  ################################################################################
  ## Render Countdown Page
  ## 
  ## Shows remaining time with circular progress ring, duration hint, and controls.
  ################################################################################
  - id: mm_timer_render_countdown
    then:
      - logger.log: "${mm_timer_log_rendering_countdown}"
      - lambda: |-
          if (id(timer_active_id).empty()) {
            ESP_LOGW("timer", "Countdown render called but timer not active");
            return;
          }
          
          const uint32_t remaining_sec = id(timer_seconds_remaining);
          const uint32_t total_sec = id(timer_first_active).total_seconds;
          const uint32_t remaining_min = remaining_sec / 60;
          const uint32_t remaining_s = remaining_sec % 60;
          
          ESP_LOGI("timer", "Display: %u:%02u remaining / %u sec total", remaining_min, remaining_s, total_sec);
      # Show timer page
      - lvgl.page.show:
          id: timer_page
      # Update timer display values
      - lvgl.widget.update:
          id: ui_timer_value
          text: !lambda |-
            char buf[8];
            uint32_t remaining_sec = id(timer_seconds_remaining);
            uint32_t remaining_min = remaining_sec / 60;
            uint32_t remaining_s = remaining_sec % 60;
            snprintf(buf, sizeof(buf), "%u:%02u", remaining_min, remaining_s);
            return std::string(buf);
      # Update duration hint
      - lvgl.widget.update:
          id: ui_timer_duration
          text: !lambda |-
            char buf[16];
            uint32_t total_sec = id(timer_first_active).total_seconds;
            snprintf(buf, sizeof(buf), "%u SEC.", total_sec);
            return std::string(buf);
      # Update progress arc (0-360 degrees based on time remaining)
      - lvgl.widget.update:
          id: ui_timer_arc
          end_angle: !lambda |-
            uint32_t remaining_sec = id(timer_seconds_remaining);
            uint32_t total_sec = id(timer_first_active).total_seconds;
            if (total_sec == 0) return 0;
            return (remaining_sec * 360) / total_sec;

  ################################################################################
  ## Render Expired Page
  ##
  ## Shows "Timer Expired" message and controls.
  ################################################################################
  - id: mm_timer_render_expired
    then:
      - logger.log: "${mm_timer_log_rendering_expired}"
      - logger.log: "Display: Timer Expired - showing expiration UI"
      # Show timer page
      - lvgl.page.show:
          id: timer_page
      # Update timer display to show "EXPIRED"
      - lvgl.widget.update:
          id: ui_timer_value
          text: "EXPIRED"
      # Update duration hint
      - lvgl.widget.update:
          id: ui_timer_duration
          text: ""
      # Set arc to full (show full ring when expired)
      - lvgl.widget.update:
          id: ui_timer_arc
          end_angle: 360
