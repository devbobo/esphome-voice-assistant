################################################################################
## Timer Module - Manifest
##
## IMPORTANT: Timer core functionality is now part of ESPHome's voice_assistant
## component and is handled by devices/includes/voice_assistant/common.yaml
##
## This module provides OPTIONAL display and Home Assistant integration:
##   - Display page rendering (countdown, expired states)
##   - HA entity integration
##   - LED/audio feedback hooks
##
## Module Status: Optional Enhancement
##   - Timers work natively in voice_assistant (always available)
##   - Include this module only if you want custom display rendering
##   - Devices without this module still have full timer functionality
##
## See devices/includes/voice_assistant/common.yaml for core timer implementation.
################################################################################

name: "${mm_timer_module_name}"
description: "${mm_timer_module_description}"
version: "2.0.0"
note: "Core timer functionality - this module is now only for optional UI/display"

display_pages:
  - page_id: "module_timer:countdown"
    description: "${mm_timer_page_countdown_desc}"
    render_script: "mm_timer_render_countdown"

  - page_id: "module_timer:expired"
    description: "${mm_timer_page_expired_desc}"
    render_script: "mm_timer_render_expired"

led_states:
  - state_id: "timer_active"
    description: "${mm_timer_led_active_desc}"
    maps_to_led_event: "processing"

  - state_id: "timer_expired"
    description: "${mm_timer_led_expired_desc}"
    maps_to_led_event: "error"

audio_sounds:
  - sound_id: "timer_started"
    description: "${mm_timer_audio_started_desc}"
    duration_ms: 500

  - sound_id: "timer_alarm"
    description: "${mm_timer_audio_alarm_desc}"
    duration_ms: 2000
    repeating: true

ha_entities:
  - entity_type: "binary_sensor"
    entity_id: "mm_timer_is_active_ha"
    name: "${mm_timer_ha_active_binary_sensor}"

  - entity_type: "binary_sensor"
    entity_id: "mm_timer_is_expired_ha"
    name: "${mm_timer_ha_expired_binary_sensor}"

  - entity_type: "sensor"
    entity_id: "mm_timer_remaining_seconds"
    name: "${mm_timer_ha_remaining_sensor}"
    unit_of_measurement: "s"

  - entity_type: "number"
    entity_id: "mm_timer_duration_setter"
    name: "${mm_timer_ha_duration_setter}"
    unit_of_measurement: "s"
    min: 1
    max: 3600

  - entity_type: "button"
    entity_id: "mm_timer_button_cancel"
    name: "${mm_timer_ha_cancel_button}"

  - entity_type: "button"
    entity_id: "mm_timer_button_acknowledge"
    name: "${mm_timer_ha_acknowledge_button}"

state_variables:
  - name: "mm_timer_duration_sec"
    type: "uint32_t"
    description: "Total duration in seconds"

  - name: "mm_timer_started_ms"
    type: "uint32_t"
    description: "System time when timer started"

  - name: "mm_timer_is_active"
    type: "bool"
    description: "Whether timer is actively counting"

  - name: "mm_timer_is_expired"
    type: "bool"
    description: "Whether timer has expired"
